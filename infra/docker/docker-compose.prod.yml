# Overrides para produção — use: make prod-up
# Ajuste DEBUG=false e SECRET_KEY no .env antes de subir.

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  backend:
    restart: always
    volumes: !reset []
    environment:
      DEBUG: ${DEBUG:-false}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: always
    volumes: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    command: node server.js

  worker:
    restart: always
    volumes: !reset []
    environment:
      DEBUG: ${DEBUG:-false}
      WORKER_PROCESS: "1"
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
